<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<!--    <meta charset="UTF-8">-->
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>Restaurant Document</title>
    <!--CSS-->
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            color: #2c3e50;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 40px 30px;
            background-color: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #1abc9c;
            padding-bottom: 20px;
        }
        .header h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
            color: #1abc9c;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #7f8c8d;
            font-size: 14px;
            margin: 0;
        }

        .report {
            margin-bottom: 30px;
            padding: 15px 20px;
            background-color: #ecf0f1;
            border-left: 4px solid #1abc9c;
            border-radius: 4px;
        }

        .report strong {
            color: #2c3e50;
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }
        .report span {
            color: #1abc9c;
            font-size: 18px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        thead {
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            color: white;
        }

        th {
            padding: 16px 12px;
            border: 1px solid #16a085;
            font-size: 13px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

         td {
            padding: 14px 12px;
            border: 1px solid #ecf0f1;
            font-size: 13px;
            color: #34495e;
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }
         tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }

        tbody tr:nth-child(even) {
            background-color: #f8fafb;
        }
        tbody tr:hover {
            background-color: #e8f8f5;
            box-shadow: inset 0 0 5px rgba(26, 188, 156, 0.1);
        }
         tbody tr:hover {
            background-color: #e8f8f5;
            box-shadow: inset 0 0 5px rgba(26, 188, 156, 0.1);
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #95a5a6;
            padding: 30px 20px;
            border-top: 1px solid #ecf0f1;
            background-color: #f7f9fc;
            margin-top: auto;
            letter-spacing: 0.5px;
        }

        /*Responsive Design*/
        @media (max-width: 768px)
        {
            .container
            {
                padding: 20px 15px;
            }
             .header h1 {
                font-size: 24px;
            }
            th, td
            {
                padding: 10px 8px;
                font-size: 12px;
            }
            table
            {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Restaurant Document List</h1>
        <p>Manage and view all restaurant documents</p>
    </div>

    <div class="report">
        <strong>Total Documents:</strong>
        <span th:text="${restaurantDoc.size()}"></span>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Restaurant Name</th>
            <th>Restaurant ID</th>
            <th>Document Type</th>
            <th>Document URL</th>
            <th>Verified</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="restaurant_doc: ${restaurantDoc}">
            <td th:text="${restaurant_doc.id}"></td>
            <td th:text="${restaurant_doc.restaurantName}"></td>
            <td th:text="${restaurant_doc.restaurantId}"></td>
            <td th:text="${restaurant_doc.documentType}"></td>
            <td th:text="${restaurant_doc.documentUrl}"></td>
            <td th:text="${restaurant_doc.verified}"></td>
        </tr>
        </tbody>
    </table>
</div>

<footer class="footer">Generated By Restaurant Service. All Rights Reserved.</footer>
</body>
</html>
