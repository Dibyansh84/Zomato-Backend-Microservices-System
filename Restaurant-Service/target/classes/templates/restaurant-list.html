<!DOCTYPE html>
    <html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<!--    <meta charset="UTF-8">-->
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>Restaurant Report</title>

    <!--CSS-->
   <style>
       body
       {
          font-family: Arial, sans-serif;
          margin: 30px;
          color: #333333;
       }
       .header
       {
            text-align: center;
            margin-bottom: 30px;
       }
       .header h1
       {
            margin: 0;
            font-size: 28px;
            color: #2c3e50;
       }
       .header
       {
            text-align: center;
            margin-bottom: 30px;
       }
       .header p
       {
           margin-top: 5px;
           font-size: 14px;
           color: #7f8c8d;
       }
       .report-info
       {
           margin-bottom: 20px;
           font-size: 14px;
       }
       table
       {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
       }
       thead
       {
            background-color: #2c3e50;
            color: white;
       }
       th {
        padding: 12px;
        border: 1px solid #dcdcdc;
        font-size: 14px;
        text-align: left;
        }
       td
       {
            padding: 10px;
            border: 1px solid #dcdcdc;
            font-size: 13px;
       }
       tr:nth-child(even) { background-color: #f8f9fa; }
       .active
       {
        color: green;
        font-weight: bold;
       }
       .inactive
       {
            color: red;
            font-weight: bold;
       }
       .footer
       {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #7f8c8d;
       }
   </style>
</head>
<body>
<div class="header">
    <h1>Restaurant Report</h1>
    <p>Generated Restaurant Listing Report</p>
</div>

<div class="report-info">
    <strong>Total Restaurants</strong>
<!--    restaurants → List passed from backend-->
<!--    .size() → gets total number of records in the list-->
    <span th:text="${restaurants.size()}"></span>
</div>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Restaurant Name</th>
        <th>Owner Name</th>
        <th>City</th>
        <th>Cuisine</th>
        <th>Rating</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
        <tr th:each = "restaurant: ${restaurants}">
            <td th:text = "${restaurant.id}"></td>
            <td th:text = "${restaurant.restaurantName}"></td>
            <td th:text = "${restaurant.ownerName}"></td>
            <td th:text = "${restaurant.city}"></td>
            <td th:text = "${restaurant.cuisineType}"></td>
            <td th:text = ${restaurant.rating}></td>

            <td>
                <span th:if="${restaurant.active}" class="active">Active</span>
                <span th:unless="${restaurant.active}" class="inactive">Inactive</span>
            </td>
        </tr>
    </tbody>
</table>
<div class="footer"> Generated by Restaurant Service System </div>
</body>
</html>
