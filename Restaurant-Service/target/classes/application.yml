server:
  port: 8083

spring:
  application:
    name: RESTAURANT-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/zomato
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: none

    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone:
        http://localhost:8761/eureka